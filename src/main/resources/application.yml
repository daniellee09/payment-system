spring:
  application:
    name: payment

  datasource:
    # 3307은 호스트의 로컬 MariaDB 11.x와 충돌 → Docker MySQL은 3308 포트 사용
    url: jdbc:mysql://localhost:3308/payment?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: payment
    password: payment
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # none: Hibernate DDL 연결을 완전히 차단해 Connector/J auth_gssapi_client 버그를 우회한다.
      # 테이블은 schema.sql을 docker exec로 직접 적용해 관리한다.
      # (ddl-auto: create / sql.init.mode: always 모두 raw JDBC 연결을 열어 버그 재발)
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        # Hibernate 7.x는 JDBC 메타데이터에서 dialect를 자동 감지하므로 명시 불필요
        # boot.allow_jdbc_metadata_access도 dialect 명시 없이는 의미가 없으므로 함께 제거
    # OSIV(Open Session in View) 비활성화 — 트랜잭션 범위 밖에서 쿼리 실행을 허용하지 않음
    # 실수로 Controller 레이어에서 Lazy Loading을 유발하는 것을 방지하기 위함
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    # CacheConfig에서 RedisCacheManager를 직접 빈으로 등록하므로 type 선언이 필수는 아니다.
    # 명시적으로 선언해 의도를 코드로 표현하고 다른 캐시 구현체로의 실수 전환을 방지한다.
    type: redis
    # TTL은 CacheConfig에서 캐시별로 개별 관리하므로 여기서는 설정하지 않는다.

logging:
  level:
    # 실행 SQL 출력 (개발 환경 전용 — 운영에서는 제거)
    org.hibernate.SQL: debug
    # 바인딩 파라미터 출력 (SQL의 ? 자리에 어떤 값이 들어가는지 확인)
    org.hibernate.orm.jdbc.bind: trace
